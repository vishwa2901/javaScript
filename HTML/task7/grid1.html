<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Fruit Grid</title>
    <link rel="stylesheet" href="grid1.css" />
</head>

<body>

    <div class="grid">

        <div class="cell grapes">
            <img src="grapes.png" alt="Grapes" />
        </div>

        <div class="cell strawberry">
            <img src="strawberry.png" alt="Strawberries" />

        </div>

        <div class="cell watermelon">
            <img src="watermelon.png" alt="Watermelon" />

        </div>

        <div class="cell orange">
            <img src="orangejpg.png" alt="orange" />

        </div>

        <div class="cell papaya">
            <img src="papaya.png" alt="Papaya" />

        </div>

        <div class="cell pineapple">
            <img src="pinejpg.png" alt="Pineapples" />

        </div>

    </div>

</body>

</html>
